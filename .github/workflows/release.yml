name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          manifest_ver=$(python3 -c "import json; print(json.load(open('custom_components/rest_bed/manifest.json'))['version'])")
          if [ "$manifest_ver" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::manifest.json version ($manifest_ver) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Package integration
        run: |
          cd custom_components/rest_bed
          zip -r ../../rest_bed.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: rest_bed.zip
