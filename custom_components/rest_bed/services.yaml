set_wifi:
  name: Set WiFi credentials
  description: >-
    Update the WiFi SSID and password on all configured ReST bed pumps.
    The pumps will disconnect and reconnect to the new network.
    WARNING: If the credentials are wrong the pumps will become unreachable
    until recovered via their direct-mode hotspot.
  fields:
    ssid:
      name: SSID
      description: The WiFi network name to connect to.
      required: true
      selector:
        text:
    password:
      name: Password
      description: The WiFi network password.
      required: true
      selector:
        text:
          type: password

save_preset:
  name: Save preset
  description: >-
    Save the current settings of all configured pumps as a named preset.
    Captures mode, firmness, distortion, tolerance, sensitivity, quiet mode,
    and all zone profiles (manual, back, side).
  fields:
    name:
      name: Preset name
      description: A short name for this preset (e.g. "Firm", "Soft", "Whitney Likes").
      required: true
      selector:
        text:

restore_preset:
  name: Restore preset
  description: >-
    Restore a previously saved preset, applying all stored settings to
    the corresponding pumps. Changes mode, firmness, and all zone profiles.
  fields:
    name:
      name: Preset name
      description: The name of the preset to restore.
      required: true
      selector:
        text:

delete_preset:
  name: Delete preset
  description: >-
    Delete a previously saved preset by name.
  fields:
    name:
      name: Preset name
      description: The name of the preset to delete.
      required: true
      selector:
        text:
