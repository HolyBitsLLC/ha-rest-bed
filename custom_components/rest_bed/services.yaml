set_wifi:
  name: Set WiFi credentials
  description: >-
    Update the WiFi SSID and password on all configured ReST bed pumps.
    The pumps will disconnect and reconnect to the new network.
    WARNING: If the credentials are wrong the pumps will become unreachable
    until recovered via their direct-mode hotspot.
  fields:
    ssid:
      name: SSID
      description: The WiFi network name to connect to.
      required: true
      selector:
        text:
    password:
      name: Password
      description: The WiFi network password.
      required: true
      selector:
        text:
          type: password

save_preset:
  name: Save preset
  description: >-
    Save the current settings of all configured pumps as a named preset.
    Captures mode, firmness, distortion, tolerance, sensitivity, quiet mode,
    and all zone profiles (manual, back, side).
  fields:
    name:
      name: Preset name
      description: A short name for this preset (e.g. "Firm", "Soft", "Whitney Likes").
      required: true
      selector:
        text:

restore_preset:
  name: Restore preset
  description: >-
    Restore a previously saved preset, applying all stored settings to
    the corresponding pumps. Changes mode, firmness, and all zone profiles.
  fields:
    name:
      name: Preset name
      description: The name of the preset to restore.
      required: true
      selector:
        text:

delete_preset:
  name: Delete preset
  description: >-
    Delete a previously saved preset by name.
  fields:
    name:
      name: Preset name
      description: The name of the preset to delete.
      required: true
      selector:
        text:

start_calibration:
  name: Start calibration
  description: >-
    Begin the multi-step pressure sensor calibration workflow. The bed
    switches to pressure-equalization mode, captures an empty-bed
    pressure baseline, then waits for you to lie down to record your
    body pressure profile. Optimal zone pressures are computed and
    applied as the Manual profile plus the detected Back or Side
    profile. The previous operating mode is restored when calibration
    completes.
    Monitor progress via the "Calibration Status" sensor.

cancel_calibration:
  name: Cancel calibration
  description: >-
    Cancel an in-progress calibration and restore the bed to its
    previous operating mode and settings.

advance_calibration:
  name: Advance calibration
  description: >-
    Manually advance the calibration to the next step. Use this if the
    automatic body detection doesn't trigger (e.g., confirm you're on
    the bed during the "waiting_body" step).
